version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: flight-booking-db
    environment:
      MYSQL_DATABASE: flight_booking_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ./backend
    container_name: flight-booking-backend
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/flight_booking_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend-web
    container_name: flight-booking-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
