spring.application.name=flight-booking-backend
server.port=8080

spring.config.import=optional:classpath:application-local.properties

spring.datasource.url=jdbc:mysql://localhost:3306/flight_booking_db?useSSL=false&serverTimezone=Asia%2FHo_Chi_Minh&connectionTimeZone=Asia%2FHo_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh

spring.jackson.time-zone=Asia/Ho_Chi_Minh

app.jwt.secret=FlightBookingSecretKey2024SuperLongSecretKeyForSecurity
app.jwt.expiration=86400000

app.cors.allowed-origin-patterns=*

flight.api.base-url=${FLIGHT_API_BASE_URL:https://airlabs.co/api/v9}
flight.api.key=${FLIGHT_API_KEY:}
flight.api.price-scale=2.0
