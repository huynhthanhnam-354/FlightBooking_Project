spring.application.name=flight-booking-backend
server.port=8081

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/flight_booking_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.jackson.time-zone=Asia/Ho_Chi_Minh


app.jwt.secret=FlightBookingSecretKey2024SuperLongSecretKeyForSecurity
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

app.cors.allowed-origin-patterns=http://localhost:5173,http://127.0.0.1:5173,*

flight.api.base-url=${FLIGHT_API_BASE_URL:https://airlabs.co/api/v9}
flight.api.key=${FLIGHT_API_KEY}
flight.api.price-scale=2.0

app.ai.api-key=${AI_API_KEY:}
app.ai.model=gpt-3.5-turbo
app.ai.url=https://api.openai.com/v1/chat/completions
app.n8n.chat-webhook-url=${N8N_CHAT_WEBHOOK_URL:}
app.n8n.webhook-secret=${N8N_WEBHOOK_SECRET:}

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
