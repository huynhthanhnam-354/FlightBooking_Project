spring.application.name=flight-booking-backend
server.port=8080

spring.config.import=optional:classpath:application-local.properties

spring.datasource.url=jdbc:mysql://localhost:3306/flight_booking_db?useSSL=false&serverTimezone=Asia%2FHo_Chi_Minh&connectionTimeZone=Asia%2FHo_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh

spring.jackson.time-zone=Asia/Ho_Chi_Minh

app.jwt.secret=FlightBookingSecretKey2024SuperLongSecretKeyForSecurity
app.jwt.expiration=86400000

app.cors.allowed-origin-patterns=*

flight.api.base-url=${FLIGHT_API_BASE_URL:https://airlabs.co/api/v9}
flight.api.key=FLIGHT_BOOKING_APP
flight.api.price-scale=2.0

# AI Configuration (OpenAI/Gemini)
app.ai.api-key=${AI_API_KEY:}
app.ai.model=gpt-3.5-turbo
app.ai.url=https://api.openai.com/v1/chat/completions

# VNPAY Payment Configuration
app.payment.vnpay.url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
app.payment.vnpay.tmn-code=${VNPAY_TMN_CODE:YOUR_TMN_CODE}
app.payment.vnpay.hash-secret=${VNPAY_HASH_SECRET:YOUR_HASH_SECRET}
app.payment.vnpay.return-url=http://localhost:5173/booking/confirmation

# Spring Mail Configuration (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
