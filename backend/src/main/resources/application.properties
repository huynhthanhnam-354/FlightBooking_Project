spring.application.name=flight-booking-backend
server.port=8081

# ==============================================================================
# SENIOR DATABASE ARCHITECT: JDBC RESILIENCE CONFIGURATION
# ==============================================================================
# Standardizing on 127.0.0.1:3307 for local Windows MySQL97 service.
# Includes fallback parameters to force secure handshake and auto-create schema.
spring.datasource.url=jdbc:mysql://127.0.0.1:3307/flight_booking?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HIKARICP OPTIMIZATION
# 30-second timeout ensures context initialization doesn't drop during high-load startups.
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000

# ------------------------------------------------------------------------------
# JPA / HIBERNATE SETTINGS
# ------------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.jackson.time-zone=Asia/Ho_Chi_Minh

# ------------------------------------------------------------------------------
# SECURITY & CORS
# ------------------------------------------------------------------------------
app.jwt.secret=FlightBookingSecretKey2024SuperLongSecretKeyForSecurity
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# Explicitly allow Vite Frontend
app.cors.allowed-origin-patterns=http://localhost:5173,http://127.0.0.1:5173,*

# ------------------------------------------------------------------------------
# INTEGRATIONS (AirLabs & AI) - PRESERVED EXACTLY
# ------------------------------------------------------------------------------
flight.api.base-url=${FLIGHT_API_BASE_URL:https://airlabs.co/api/v9}
flight.api.key=beb53d3c-9d1a-40e1-ba68-d06ffb5db1dd
flight.api.price-scale=2.0

app.ai.api-key=${AI_API_KEY:}
app.ai.model=gpt-3.5-turbo
app.ai.url=https://api.openai.com/v1/chat/completions
app.n8n.chat-webhook-url=${N8N_CHAT_WEBHOOK_URL:}
app.n8n.webhook-secret=${N8N_WEBHOOK_SECRET:}

# VNPAY
app.payment.vnpay.url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
app.payment.vnpay.tmn-code=${VNPAY_TMN_CODE:YOUR_TMN_CODE}
app.payment.vnpay.hash-secret=${VNPAY_HASH_SECRET:YOUR_HASH_SECRET}
app.payment.vnpay.return-url=http://localhost:5173/booking/confirmation

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
